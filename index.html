<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>RKAS Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <img src="img/LOGO TKIT IMAM BUKHARI.png" class="logo">
    <h2>RKAS TK Imam Bukhari</h2>
  </div>

  <!-- PAGU -->
 <div class="pagu-box">
  <div class="left">
    <label>Tahun Ajaran:</label>
    <input type="text" id="tahunAjaran" placeholder="2025/2026" onchange="simpanData()">

    <label>Pagu:</label>
    <input type="text" id="paguInput" oninput="formatInput(this)" onchange="updatePagu()">

    <span>Tahap 1: <b id="tahap1">0</b></span>
    <span>Tahap 2: <b id="tahap2">0</b></span>
  </div>

  <div class="right" id="jam"></div>
</div>
  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Komponen</th>
        <th>🔋</th>
        <th>%</th>
        <!-- <th>Besaran</th> -->
        <th>Input</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <button onclick="tambahKomponen()" style="background-color: #007bff;; color: white; border-radius: 5px; border-color: #007bff; margin-bottom: 20px;">＋ Tambah Komponen</button>

  <!-- CARD -->
<div class="summary-container">
  <div class="card summary">
    <h3>Total Digunakan</h3>
    <p id="totalInput">Rp 0</p>
  </div>

  <div class="card summary">
    <h3>Sisa Dana</h3>
    <p id="sisaDana">Rp 0</p>
  </div>
</div>

<!-- CHART -->
<div class="card chart-card">
  <div class="card-header">
    📊 Distribusi Anggaran
  </div>

  <div class="chart-wrapper">
    <canvas id="myChart"></canvas>
  </div>

  <div id="legendCustom" class="legend"></div>
</div>

<canvas id="chart"></canvas>
  <button onclick="exportExcel()" style="background-color: #007bff;; color: white; border-radius: 5px; border-color: #007bff;">📊 Export Excel</button>
  <div class="import-box" id="dropZone">
  <p>📂 Drag & Drop Excel di sini</p>
  <button onclick="document.getElementById('fileInput').click()">
    Upload Excel
  </button>
  <input type="file" id="fileInput" accept=".xlsx" hidden>
</div>

<!-- PREVIEW -->
<div id="previewBox" style="display:none;">
  <h3>Preview Data</h3>
  <table id="previewTable"></table>
  <button onclick="confirmImport()">✅ Import Sekarang</button>
</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content big">
    <h3 id="modalTitle"></h3>

    <table>
      <thead>
        <tr>
      <th>No</th>
      <th>Nama Barang/Jasa</th>
      <th>Sub</th>
      <th>Kegiatan</th>
      <th>Uraian</th>
      <th>Qty</th>
      <th>Harga</th>
      <th>Jumlah</th>
      <th>Tanggal</th>
      <th>Keterangan</th>
      <th>Bukti</th>
      <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="detailTable"></tbody>
    </table>
    <div style="margin-top:10px; text-align:right;">
  <b>Total: <span id="totalDetail">Rp 0</span></b>
</div>
    <div class="modal-actions">
  <button class="btn-add" onclick="tambahItem()">＋</button>
  <button class="btn-save" onclick="simpanData()">💾</button>
  <button class="btn-close" onclick="closeModal()">✖</button>
</div>
  </div>
</div>
<div id="imageModal" class="img-modal" onclick="closePreview()">
  <img id="modalImg" class="img-content">
</div>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<!-- Firebase -->
<script type="module" src="script.js"></script>
</body>
</html>
