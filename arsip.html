<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Arsip RKAS | TKIT Imam Bukhari</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card-arsip { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; backdrop-filter: blur(10px); transition: 0.3s; }
        .card-arsip:hover { transform: translateY(-5px); border-color: #22d3ee; }
        .badge-tahun { background: #6366f1; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; }
        .detail-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; border-left: 3px solid #fbbf24; }
    </style>
</head>
<body style="background: #110727; color: white;">

    <div class="main-content" style="padding: 40px; max-width: 1200px; margin: auto;">
        <header style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">
            <div>
                <h1 style="font-size: 2rem; color: #22d3ee;"><i class="fas fa-archive"></i> Vault <span>Arsip</span></h1>
                <p style="opacity: 0.7;">Riwayat data komponen dan anggaran per tahun</p>
            </div>
            <a href="index.html" class="btn-glow-add" style="text-decoration: none; background: #4f46e5; padding: 10px 20px; border-radius: 8px;">
                <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
            </a>
        </header>

        <div style="margin-top: 30px; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; display: flex; gap: 15px; align-items: center;">
            <div style="flex: 1;">
                <label style="display: block; font-size: 0.8rem; color: #fbbf24; margin-bottom: 5px;">Pilih Tahun Ajaran</label>
                <div style="flex: 1;">
    <label style="display: block; font-size: 0.8rem; color: #fbbf24; margin-bottom: 5px;">Ketik Tahun Ajaran yang Dicari</label>
    <input type="text" id="cariTahunArsip" placeholder="Misal: 2025/2026" style="width: 100%; padding: 12px; background: #1e113a; color: white; border: 1px solid #4f46e5; border-radius: 8px;">
</div>
            </div>
            <button id="btnBukaArsip" onclick=loadDataArsip() style="padding: 12px 30px; margin-top: 20px; background: #22d3ee; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                BUKA DATA
            </button>
        </div>

        <div id="arsipDisplay" class="archive-grid">
            </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCuZBG43SG6BmxN3VYVQgJRh2sPk0P-UK0",
        authDomain: "rkasweb.firebaseapp.com",
        projectId: "rkasweb",
        storageBucket: "rkasweb.firebasestorage.app",
        appId: "1:878789834712:web:b23714fc813a13c980a4ad"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadDataArsip() {
        const inputEl = document.getElementById("cariTahunArsip");
        const display = document.getElementById("arsipDisplay");
        
        if (!inputEl.value) return alert("Ketik tahunnya dulu, Wir!");
        
        const tahunID = inputEl.value.replace(/\//g, "-").trim();
        display.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Membuka Brankas Data...</p>";

        try {
            const docRef = doc(db, "rkas_arsip", tahunID);
            const snap = await getDoc(docRef);

            if (snap.exists()) {
                const d = snap.data();
                
                // HEADER INFO (Pagu Dana diletakkan di atas agar tidak perlu scroll)
                display.innerHTML = `
                    <div style="grid-column: 1/-1; display: flex; justify-content: space-between; align-items: center; background: rgba(99, 102, 241, 0.1); padding: 20px; border-radius: 15px; border: 1px solid #4f46e5; margin-bottom: 10px;">
                        <div>
                            <h2 style="margin:0; color: #22d3ee;">Tahun Ajaran ${d.tahun_ajaran}</h2>
                            <p style="margin:5px 0 0 0; font-size: 1.5rem; font-weight: 800; color: #fbbf24;">Pagu: Rp ${(d.total_pagu || 0).toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="hapusArsipFull('${tahunID}', '${d.tahun_ajaran}')" style="background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">
                            <i class="fas fa-trash"></i> Hapus Arsip
                        </button>
                    </div>
                    ${renderCardsArsip(d.data_komponen || [], d.detail_komponen || {})}
                `;
            } else {
                display.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding: 50px; opacity: 0.5;">Data tidak ditemukan.</p>`;
            }
        } catch (err) {
            console.error(err);
            alert("Gagal ambil data!");
        }
    }

    function renderCardsArsip(komponen, detail) {
        return komponen.map((k, index) => {
            // Kita ambil detail berdasarkan nama komponen
            const items = detail[k.nama] || [];
            
            return `
                <div class="card-arsip">
                    <div style="display: flex; justify-content: space-between;">
                        <span class="badge-tahun">Komponen ${index + 1}</span>
                        <i class="fas fa-folder" style="color: #22d3ee;"></i>
                    </div>
                    <h3 style="margin: 15px 0 5px 0; color: white;">${k.nama}</h3>
                    <p style="color: #fbbf24; font-weight: bold; margin-bottom: 15px;">Subtotal: Rp ${(k.input || 0).toLocaleString('id-ID')}</p>
                    
                    <button onclick="toggleDetail('${index}')" style="width: 100%; padding: 10px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer;">
                        <i class="fas fa-list"></i> Lihat Detail
                    </button>

                    <div id="detail-${index}" style="display: none; margin-top: 15px;">
                        ${items.map(item => `
                            <div class="detail-item" style="border-left: 3px solid #22d3ee; margin-bottom: 8px; background: rgba(0,0,0,0.3);">
                                <div style="font-weight: bold; color: #22d3ee;">${item.namaBarang || item.nama || 'Tanpa Nama'}</div>
                                <div style="font-size: 0.8rem; opacity: 0.8;">${item.uraian || '-'}</div>
                                <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.85rem;">
                                    <span>${item.satuan || item.volume || 0} x Rp ${(item.harga || 0).toLocaleString('id-ID')}</span>
                                    <span style="color: #fbbf24;">Rp ${((item.satuan || item.volume || 0) * (item.harga || 0)).toLocaleString('id-ID')}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    // Fungsi Global
    window.toggleDetail = (idx) => {
        const el = document.getElementById(`detail-${idx}`);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    window.hapusArsipFull = async (id, tahun) => {
        if (confirm(`Yakin mau hapus arsip ${tahun}? Data bakal hilang permanen!`)) {
            await deleteDoc(doc(db, "rkas_arsip", id));
            alert("Arsip berhasil dihapus!");
            location.reload();
        }
    };

    document.getElementById("btnBukaArsip").addEventListener("click", loadDataArsip);
</script>
</body>
</html>
